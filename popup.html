<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color: #07080e;
            --neon-blue: #00f0ff;
            --neon-purple: #8a2be2;
            --glass-bg: rgba(25, 26, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f5;
            --text-muted: #8c8f9b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Dimension fixée pour le popup de l'extension */
        body {
            width: 350px;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 0%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 100%, rgba(0, 240, 255, 0.15) 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
            padding: 20px;
        }

        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 25px 25px;
            z-index: 0;
            pointer-events: none;
        }

        .vault-container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 24px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .slider-section {
            display: flex; flex-direction: column; gap: 10px;
        }

        .slider-header {
            display: flex; justify-content: space-between;
            font-size: 13px; color: var(--text-muted);
        }

        .slider-header span {
            color: var(--neon-blue); font-weight: bold; font-size: 15px;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
        }

        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px; border-radius: 50%;
            background: #fff; cursor: pointer; margin-top: -6px;
            box-shadow: 0 0 10px var(--neon-blue);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            border: none; padding: 12px; border-radius: 10px;
            color: #fff; font-size: 14px; font-weight: 600;
            cursor: pointer; position: relative; overflow: hidden;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }

        .btn-generate:disabled {
            background: #2a2b35; color: #7a7b85; box-shadow: none; cursor: not-allowed;
        }

        .result-box {
            display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px; padding: 5px 5px 5px 12px;
        }

        .result-box input {
            flex-grow: 1; background: transparent; border: none;
            color: #fff; font-size: 14px; font-family: monospace; outline: none; width: 100%;
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px; width: 32px; height: 32px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: var(--text-muted);
        }

        .btn-copy svg { width: 16px; height: 16px; fill: currentColor; }

        .source-info { text-align: center; font-size: 11px; color: var(--text-muted); min-height: 14px; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="vault-container">
        <h1>Quantum Vault</h1>
        
        <div class="slider-section">
            <div class="slider-header">
                <label>Longueur</label>
                <span id="slider-val">16</span>
            </div>
            <input type="range" id="slider" min="12" max="32" value="16">
        </div>

        <button class="btn-generate" id="btn-generate">Générer (Connexion Quantique)</button>

        <div class="result-box">
            <input type="text" id="result-input" placeholder="..." readonly>
            <button class="btn-copy" id="btn-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
        </div>

        <div class="source-info" id="source-info">-</div>
    </div>

    <!-- Le script ne peut pas être inline dans une extension MV3, il doit être importé ! -->
    <script src="popup.js"></script>
</body>
</html>
