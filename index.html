<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Password Vault</title>
    <!-- Police moderne et lisible -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette de couleurs "Cyberpunk / Tech" */
            --bg-color: #07080e;
            --neon-blue: #00f0ff;
            --neon-purple: #8a2be2;
            --glass-bg: rgba(25, 26, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f5;
            --text-muted: #8c8f9b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            /* Glow en fond pour sublimer le verre dépoli */
            background-image: 
                radial-gradient(circle at 20% 0%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 100%, rgba(0, 240, 255, 0.15) 0%, transparent 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Grille en arrière-plan (Tech feeling) */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
            pointer-events: none;
        }

        /* Glassmorphism Container */
        .vault-container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.6), 
                inset 0 0 20px rgba(255,255,255,0.02),
                inset 0 0 0 1px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 25px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .vault-container:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 40px 70px rgba(0,0,0,0.7), 
                0 0 40px rgba(138, 43, 226, 0.1),
                inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .slider-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            color: var(--text-muted);
        }

        .slider-header span {
            color: var(--neon-blue);
            font-weight: 600;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 15px var(--neon-blue), 0 0 5px var(--neon-blue);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        /* Bouton Générer */
        .btn-generate {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            border: none;
            padding: 16px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.4);
            letter-spacing: 0.5px;
        }

        /* Effet de brillance / hover sur le bouton */
        .btn-generate::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-generate:hover:not(:disabled)::before {
            left: 100%;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.5);
        }

        .btn-generate:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn-generate:disabled {
            background: linear-gradient(135deg, #3a3b45, #2a2b35);
            color: #7a7b85;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Box du Résultat */
        .result-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 8px 8px 8px 16px;
            transition: border-color 0.3s;
        }

        .result-box:focus-within {
            border-color: rgba(0, 240, 255, 0.4);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .result-box input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
            width: 100%; 
            letter-spacing: 1.5px;
        }
        
        .result-box input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            letter-spacing: 0;
        }

        /* Bouton Copier */
        .btn-copy {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            width: 42px; height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: scale(1.05);
        }

        .btn-copy svg {
            width: 20px; height: 20px;
            fill: currentColor;
        }

        /* Source discrète */
        .source-info {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            min-height: 18px;
            margin-top: -5px;
            font-weight: 300;
            transition: color 0.3s;
        }
    </style>
</head>
<body>
    <!-- Grille de fond -->
    <div class="grid-bg"></div>

    <!-- Le Coffre -->
    <div class="vault-container">
        <h1>Quantum Password Vault</h1>
        
        <div class="slider-section">
            <div class="slider-header">
                <label for="slider">Longueur du mot de passe</label>
                <span id="slider-val">16</span>
            </div>
            <input type="range" id="slider" min="12" max="32" value="16">
        </div>

        <button class="btn-generate" id="btn-generate">Générer (Connexion Quantique)</button>

        <div class="result-box">
            <input type="text" id="result-input" placeholder="Attente du signal quantique..." readonly>
            <button class="btn-copy" id="btn-copy" title="Copier le mot de passe">
                <svg viewBox="0 0 24 24">
                    <path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                </svg>
            </button>
        </div>

        <div class="source-info" id="source-info">Source d'entropie : -</div>
    </div>

    <!-- Logique JS -->
    <script>
        // DOM Elements
        const slider = document.getElementById('slider');
        const sliderVal = document.getElementById('slider-val');
        const btnGenerate = document.getElementById('btn-generate');
        const resultInput = document.getElementById('result-input');
        const btnCopy = document.getElementById('btn-copy');
        const sourceInfo = document.getElementById('source-info');

        // SVG Backup pour restaurer le bouton copier
        const copyIconSvg = '<svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>';

        // Mise à jour de l'affichage du slider en temps réel
        slider.addEventListener('input', (e) => {
            sliderVal.textContent = e.target.value;
        });

        // Appel à l'API FastAPI et traitement
        btnGenerate.addEventListener('click', async () => {
            const length = slider.value;
            
            // État UI "Chargement"
            btnGenerate.disabled = true;
            btnGenerate.textContent = "Connexion au serveur...";
            resultInput.value = "";
            resultInput.placeholder = "Génération en cours...";
            sourceInfo.textContent = "Récupération des données quantiques...";
            sourceInfo.style.color = "var(--text-muted)";

            try {
                // Requête HTTP vers le serveur local (nécessite le CORS !)
                const response = await fetch(`http://localhost:8000/generer-mot-de-passe?longueur=${length}`);
                
                if (!response.ok) throw new Error("Serveur indisponible ou erreur réseau.");
                
                const data = await response.json();
                
                // Mettre à jour l'entrée
                resultInput.value = data.mot_de_passe;
                sourceInfo.textContent = `Source d'entropie : ${data.source}`;
                
                // Différenciation visuelle : Tech = bleu vif (Quantique), violet (Hybride), orange (Fallback Classique)
                if (data.source.includes('Quantique')) {
                    sourceInfo.style.color = "var(--neon-blue)";
                } else if (data.source.includes('Hybride')) {
                    sourceInfo.style.color = "var(--neon-purple)";
                } else {
                    sourceInfo.style.color = "#ffaa00"; // Fallback CSPRNG
                }
                
            } catch (error) {
                console.error("Erreur API :", error);
                resultInput.placeholder = "Échec de la connexion";
                sourceInfo.textContent = "Erreur : L'API locale (Port 8000) semble éteinte.";
                sourceInfo.style.color = "#ff4444";
            } finally {
                // Restauration du bouton
                btnGenerate.disabled = false;
                btnGenerate.textContent = "Générer (Connexion Quantique)";
            }
        });

        // Logique "Copier dans le presse-papiers"
        btnCopy.addEventListener('click', async () => {
            const pwd = resultInput.value;
            if (!pwd || pwd === "Échec de la connexion") return; // On ne copie pas le vide

            try {
                // API moderne de presse-papiers
                await navigator.clipboard.writeText(pwd);
                
                // Feedback visuel "Copié !"
                btnCopy.innerHTML = "<span style='font-size:12px; font-weight:700; color:var(--neon-blue); padding:0 2px;'>Copié!</span>";
                btnCopy.style.width = "55px"; // On l'agrandit légèrement pour le texte
                
                // Retour à la normale après 2s
                setTimeout(() => {
                    btnCopy.innerHTML = copyIconSvg;
                    btnCopy.style.width = "42px";
                }, 2000);
                
            } catch (err) {
                console.error('Erreur lors de la copie', err);
            }
        });
    </script>
</body>
</html>
